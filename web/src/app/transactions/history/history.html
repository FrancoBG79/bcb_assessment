<h2 mat-dialog-title>History</h2>
<mat-dialog-content>
 <b>Transaction ID:</b> {{ data.TransactionId }} <br>
    @if (loading) {
        <div class="spinner-container">
            <mat-spinner></mat-spinner>
        </div>
    } @else {
        <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

            <!--- Note that these columns can be defined in any order.
                The actual rendered columns are set as a property on the row definition" -->

            <!-- ID Column -->
            <ng-container matColumnDef="id">
                <th mat-header-cell *matHeaderCellDef> ID. </th>
                <td mat-cell *matCellDef="let element; let i = index;"> {{ i + 1 }} </td>
            </ng-container>

            <!-- Status Column -->
            <ng-container matColumnDef="status">
                <th mat-header-cell *matHeaderCellDef> Status </th>
                <td mat-cell *matCellDef="let element"> {{element.Status}} </td>
            </ng-container>

            <!-- Update Date Column -->
            <ng-container matColumnDef="updateDate">
                <th mat-header-cell *matHeaderCellDef> Update Date </th>
                <td mat-cell *matCellDef="let element"> {{element.UpdateDate | date: 'short' }} </td>
            </ng-container>


            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
    }
  
</mat-dialog-content>
<mat-dialog-actions>
  <button matButton mat-dialog-close cdkFocusInitial>Ok</button>
</mat-dialog-actions>
